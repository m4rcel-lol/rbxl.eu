version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rbxl-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET:-change-this-in-production}
      - DB_PATH=/app/data/rbxl.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - app-data:/app/data
    networks:
      - rbxl-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: rbxl-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - rbxl-net
    depends_on:
      - app

volumes:
  app-data:
  caddy-data:
  caddy-config:

networks:
  rbxl-net:
    driver: bridge
